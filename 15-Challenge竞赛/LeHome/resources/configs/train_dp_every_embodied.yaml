dataset:
  repo_id: repo_dp_every_embodied
  root: Datasets/example/top_long_merged

policy:
  type: diffusion
  device: cuda
  push_to_hub: false

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: /root/gpufree-data/lehome-outputs/train/dp_top_long
batch_size: 8
steps: 90000
save_freq: 10000
log_freq: 100
eval_freq: 10000

wandb:
  enable: false
