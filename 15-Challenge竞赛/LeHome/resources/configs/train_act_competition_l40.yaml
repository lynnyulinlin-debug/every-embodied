dataset:
  repo_id: repo_act_competition_l40
  root: Datasets/example/four_types_merged

policy:
  type: act
  device: cuda
  push_to_hub: false

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: /root/gpufree-data/lehome-outputs/train/act_four_types_l40
batch_size: 64
steps: 50000
save_freq: 2500
log_freq: 50
eval_freq: 5000

wandb:
  enable: false
